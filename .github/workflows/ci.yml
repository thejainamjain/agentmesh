name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  python:
    name: Python Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('pyproject.toml') }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Install C++ build tools
        run: sudo apt-get install -y cmake libpython3-dev pybind11-dev libssl-dev

      - name: Build C++ extension
        run: |
          cd agentmesh/monitor/_ext
          mkdir -p build && cd build
          cmake .. -DPYTHON_EXECUTABLE=$(python -c "import sys; print(sys.executable)")
          cmake --build . --verbose
          # Copy whatever .so was produced (name varies by Python version and platform)
          find . -name "interceptor_core*.so" -exec cp {} ../ \;
          ls -la ../interceptor_core*.so

      - name: Run tests with coverage
        run: pytest tests/ -v --cov=agentmesh --cov-report=xml --cov-fail-under=85
        env:
          AGENTMESH_SECRET_KEY: ci_test_secret_key_not_real

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        if: matrix.python-version == '3.13'
        with:
          file: ./coverage.xml

  js-sdk:
    name: TypeScript SDK Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: sdk/package-lock.json

      - name: Install SDK dependencies
        run: cd sdk && npm ci

      - name: Run Jest tests
        run: cd sdk && npm test -- --coverage

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install bandit
        run: pip install bandit

      - name: Run security scan
        run: bandit -r agentmesh/ -ll -x agentmesh/monitor/_ext/