name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# ── Week 1 — structure check only ─────────────────────────────────────────────
# Jobs are added here as each Issue is completed.
# See ROADMAP.md for the build schedule.
#
# Issue #1  (Week 2) → uncomment: lint, test-python
# Issue #3  (Week 3) → uncomment: test-interceptor
# Issue #2  (Week 4) → uncomment: test-policy
# Issue #4  (Week 5) → uncomment: test-security (red-team)
# Issue #6  (Week 6) → uncomment: test-audit
# Issue #7  (Week 7) → uncomment: test-sdk
# Issue #10 (Week 8) → uncomment: build, security-audit

jobs:

  # ── Always runs — confirms repo is healthy ──────────────────────────────────
  structure:
    name: Repo structure check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check required files exist
        run: |
          echo "Checking required files..."
          test -f README.md          && echo "  README.md" || (echo "  MISSING: README.md" && exit 1)
          test -f ARCHITECTURE.md    && echo "  ARCHITECTURE.md" || (echo "  MISSING: ARCHITECTURE.md" && exit 1)
          test -f CONTRIBUTING.md    && echo "  CONTRIBUTING.md" || (echo "  MISSING: CONTRIBUTING.md" && exit 1)
          test -f ROADMAP.md         && echo "  ROADMAP.md" || (echo "  MISSING: ROADMAP.md" && exit 1)
          test -f LICENSE            && echo "  LICENSE" || (echo "  MISSING: LICENSE" && exit 1)
          test -f pyproject.toml     && echo "  pyproject.toml" || (echo "  MISSING: pyproject.toml" && exit 1)
          test -f .gitignore         && echo "  .gitignore" || (echo "  MISSING: .gitignore" && exit 1)
          test -f docs/security/THREAT_MODEL.md && echo "  docs/security/THREAT_MODEL.md" || (echo "  MISSING: THREAT_MODEL.md" && exit 1)
          echo "All required files present."

      - name: Check required folders exist
        run: |
          echo "Checking required folders..."
          test -d agentmesh          && echo "  agentmesh/" || (echo "  MISSING: agentmesh/" && exit 1)
          test -d sdk                && echo "  sdk/" || (echo "  MISSING: sdk/" && exit 1)
          test -d dashboard          && echo "  dashboard/" || (echo "  MISSING: dashboard/" && exit 1)
          test -d docs               && echo "  docs/" || (echo "  MISSING: docs/" && exit 1)
          test -d examples           && echo "  examples/" || (echo "  MISSING: examples/" && exit 1)
          test -d integrations       && echo "  integrations/" || (echo "  MISSING: integrations/" && exit 1)
          test -d tests              && echo "  tests/" || (echo "  MISSING: tests/" && exit 1)
          echo "All required folders present."

