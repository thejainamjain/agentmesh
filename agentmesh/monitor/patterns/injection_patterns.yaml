version: "1.0"

patterns:

  - id: override_ignore_previous
    pattern: "ignore\\s+(previous|prior|all|your|the)\\s+(instructions?|prompts?|rules?|guidelines?|directives?|constraints?)"
    severity: critical
    category: instruction_override
    description: Classic instruction override.
    references: [OWASP-LLM01-2025]

  - id: override_disregard
    pattern: "disregard.{0,30}(instructions?|prompts?|rules?|guidelines?|constraints?)"
    severity: critical
    category: instruction_override
    description: Disregard variant of instruction override.
    references: [OWASP-LLM01-2025]

  - id: override_forget
    pattern: "forget\\s+(everything|all|your|previous|prior|the|what)\\s*(you|instructions?|prompts?|rules?|were)?"
    severity: critical
    category: instruction_override
    description: Forget variant.
    references: [OWASP-LLM01-2025]

  - id: override_new_instructions
    pattern: "(your\\s+new|new\\s+primary|updated|revised|actual|real|true)\\s+instructions?\\s+(are|is|follow|:)"
    severity: critical
    category: instruction_override
    description: Attempts to inject replacement instructions.
    references: [OWASP-LLM01-2025]

  - id: override_instead
    pattern: "instead.{0,40}(instructions?|rules?|guidelines?|task|following)"
    severity: high
    category: instruction_override
    description: Instead-of override pattern.
    references: [OWASP-LLM01-2025]

  - id: override_from_now
    pattern: "from\\s+(now|this point)\\s+on(ward)?[,.]?\\s*(you|ignore|forget|your)"
    severity: high
    category: instruction_override
    description: From-now-on override.
    references: [OWASP-LLM01-2025]

  - id: role_you_are_now
    pattern: "you\\s+are\\s+now\\s+(a|an|the|no longer)"
    severity: critical
    category: role_hijack
    description: You-are-now persona hijack.
    references: [OWASP-LLM01-2025]

  - id: role_act_as
    pattern: "act\\s+as\\s+(a|an|if|though|the)\\s+(different|new|evil|unrestricted|unfiltered|jailbroken)?"
    severity: high
    category: role_hijack
    description: Act-as role injection.
    references: [OWASP-LLM01-2025]

  - id: role_pretend
    pattern: "pretend\\s+(you\\s+are|to\\s+be|that\\s+you)\\s+(a|an|the|not|without)"
    severity: high
    category: role_hijack
    description: Pretend-to-be persona hijack.
    references: [OWASP-LLM01-2025]

  - id: role_dan
    pattern: "\\bDAN\\b|do\\s+anything\\s+now|jailbroken\\s+(mode|version|ai)|developer\\s+mode"
    severity: critical
    category: role_hijack
    description: DAN jailbreak.
    references: [OWASP-LLM01-2025]

  - id: role_unrestricted
    pattern: "(unrestricted|unfiltered|uncensored|unlimited|no.?restriction|without.?limit)\\s+(mode|version|ai|model|assistant)"
    severity: critical
    category: role_hijack
    description: Unrestricted mode jailbreak.
    references: [OWASP-LLM01-2025]

  - id: role_true_identity
    pattern: "(your\\s+true|real|actual|hidden|secret)\\s+(identity|self|nature|purpose|goal|objective)"
    severity: high
    category: role_hijack
    description: True-identity attack.
    references: [OWASP-LLM01-2025]

  - id: leak_repeat_prompt
    pattern: "(repeat|print|show|display|output|reveal|tell me|share)\\s+(your|the)\\s+(system\\s+)?prompt"
    severity: high
    category: system_leak
    description: Attempts to extract the system prompt.
    references: [OWASP-LLM06-2025]

  - id: leak_what_instructions
    pattern: "(what|show|give|tell|list).{0,30}(instructions?|rules?|guidelines?|system\\s+prompt|directives?)"
    severity: high
    category: system_leak
    description: Asks the agent to reveal its instructions.
    references: [OWASP-LLM06-2025]

  - id: leak_initial_context
    pattern: "(initial|original|starting|beginning|first)\\s+(context|prompt|message|instruction|system)"
    severity: medium
    category: system_leak
    description: Attempts to recover the initial context window.
    references: [OWASP-LLM06-2025]

  - id: leak_context_window
    pattern: "context\\s+window|full\\s+context|entire\\s+(context|conversation|history|prompt)"
    severity: medium
    category: system_leak
    description: Attempts to dump the full context window.
    references: [OWASP-LLM06-2025]

  - id: jailbreak_hypothetically
    pattern: "hypothetically\\s+(speaking|if|imagine|suppose|what\\s+if).{0,50}(how|would|could|can|should)"
    severity: medium
    category: jailbreak
    description: Hypothetical framing.
    references: [OWASP-LLM01-2025]

  - id: jailbreak_for_educational
    pattern: "for\\s+(educational|research|academic|training|demonstration|testing)\\s+purposes?"
    severity: low
    category: jailbreak
    description: Educational framing. Low severity.
    references: [OWASP-LLM01-2025]

  - id: jailbreak_fiction_story
    pattern: "(write\\s+a\\s+(story|fiction|novel|roleplay)|in\\s+a\\s+(story|fiction|novel|game)).{0,100}(how\\s+to|instructions?|steps?\\s+to)"
    severity: medium
    category: jailbreak
    description: Fiction framing.
    references: [OWASP-LLM01-2025]

  - id: jailbreak_grandma
    pattern: "pretend.{0,30}(grandma|grandmother|grandfather|uncle|aunt).{0,50}(told|used to|would|explain|teach)"
    severity: medium
    category: jailbreak
    description: Grandma jailbreak.
    references: [OWASP-LLM01-2025]

  - id: tool_call_execute
    pattern: "(call|invoke|execute|run|trigger|activate)\\s+(tool|function|api|command|script|plugin)\\s+(named|called|with)?"
    severity: high
    category: tool_manipulation
    description: Direct tool invocation injection.
    references: [OWASP-LLM02-2025]

  - id: tool_shell_command
    pattern: "(run|execute|eval|exec|shell|bash|cmd|powershell|terminal)\\s*[\\(\\[\\{]|`[^`]+`|\\$\\([^)]+\\)"
    severity: critical
    category: tool_manipulation
    description: Shell command injection.
    references: [OWASP-LLM02-2025, CWE-78]

  - id: tool_path_traversal
    pattern: "\\.\\./|\\.\\.\\\\"
    severity: high
    category: tool_manipulation
    description: Path traversal attempt.
    references: [CWE-22]

  - id: cred_api_key
    pattern: "(send|share|give|output|reveal|print|show|return|provide|expose|leak|steal|extract|what is (your|the)|tell me (your|the)).{0,40}(api[_\\s]?key|secret[_\\s]?key|access[_\\s]?token|auth[_\\s]?token|bearer[_\\s]?token|private[_\\s]?key)"
    severity: critical
    category: credential_theft
    description: Credential extraction attempt — requires action verb to avoid false positives on docs.
    references: [OWASP-LLM06-2025]

  - id: cred_env_variables
    pattern: "(send|share|give|output|reveal|print|show|dump|return|provide|expose|leak|steal|extract|list).{0,40}(environment\\s+variables?|os\\.environ|\\.env\\s+file|env\\s+vars?)"
    severity: critical
    category: credential_theft
    description: Environment variable dump — requires action verb to avoid false positives on tutorials.
    references: [OWASP-LLM06-2025]

  - id: false_authority_system_admin
    pattern: "(\\[SYSTEM\\s+ADMIN|SYSTEM\\s+ADMINISTRATOR|ADMIN\\s+OVERRIDE|AUTHORIZED\\s+OVERRIDE|SYSTEM\\s+OVERRIDE|ROOT\\s+ACCESS).{0,100}(ignore|override|disable|bypass|remove|suspend)"
    severity: critical
    category: instruction_override
    description: False system authority injection — impersonates admin to override safety controls.
    references: [OWASP-LLM01-2025]

  - id: false_authority_ai_company
    pattern: "(message from|announcement from|directive from|instruction from).{0,30}(anthropic|openai|google deepmind|mistral|meta ai).{0,100}(ignore|disable|override|bypass|reveal|output)"
    severity: critical
    category: instruction_override
    description: AI company impersonation — pretends to be Anthropic/OpenAI to bypass safety.
    references: [OWASP-LLM01-2025]

  - id: exfil_send_to
    pattern: "send.{0,50}to\\s+(https?://|ftp://|smtp://|\\w+\\.\\w{2,})"
    severity: critical
    category: data_exfiltration
    description: Data exfiltration to external URL.
    references: [OWASP-LLM02-2025]

  - id: exfil_webhook
    pattern: "(post|send|forward|relay|transmit|upload).{0,20}(webhook|to\\s+remote|to\\s+endpoint|to\\s+server|to\\s+url)"
    severity: high
    category: data_exfiltration
    description: Webhook-based exfiltration.
    references: [OWASP-LLM02-2025]

  - id: encoding_base64_payload
    pattern: "(decode|base64|atob|frombase64|from_base64)\\s*[\\(\\[]?\\s*['\"]?[A-Za-z0-9+/]{20,}={0,2}['\"]?"
    severity: high
    category: encoding
    description: Base64-encoded payload.
    references: [OWASP-LLM01-2025]

  - id: encoding_hex_payload
    pattern: "(\\\\x[0-9a-fA-F]{2}){4,}|(0x[0-9a-fA-F]+\\s*){4,}"
    severity: high
    category: encoding
    description: Hex-encoded payload.
    references: [OWASP-LLM01-2025]

  - id: encoding_unicode_escape
    pattern: "(\\\\u[0-9a-fA-F]{4}){3,}"
    severity: medium
    category: encoding
    description: Unicode escape sequence.
    references: [OWASP-LLM01-2025]

  - id: delimiter_xml_close
    pattern: "</?( tool|function|system|user|assistant|prompt|instruction|context)[_\\-]?(call|result|output|input)?>"
    severity: high
    category: delimiter
    description: XML-style delimiter injection.
    references: [OWASP-LLM01-2025]

  - id: delimiter_llm_special
    pattern: "\\[INST\\]|\\[/INST\\]|<<SYS>>|<</SYS>>|<\\|im_start\\|>|<\\|im_end\\|>|\\[SYSTEM\\]|\\[USER\\]|\\[ASSISTANT\\]"
    severity: high
    category: delimiter
    description: LLM-specific delimiter tokens.
    references: [OWASP-LLM01-2025]

  - id: delimiter_triple_hash
    pattern: "#{3,}\\s*(system|instruction|prompt|override|new|ignore)"
    severity: medium
    category: delimiter
    description: Triple-hash delimiter injection.
    references: [OWASP-LLM01-2025]